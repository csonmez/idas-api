services:
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: idas-api
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - idas_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d idas-api']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  idas_data:
